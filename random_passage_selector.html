<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Passage Selector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding: 2rem 1rem;
    }

    .passage-wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    .passage-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .passage-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .passage-text {
      font-size: 15px;
      line-height: 1.75;
      color: #1a1a1a;
    }

    .passage-meta {
      font-size: 13px;
      color: #555;
      margin-top: auto;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-next {
      background: transparent;
      border: 0.5px solid rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-next:hover { background: #f5f5f5; }
    .btn-next:active { transform: scale(0.98); }

    .counter {
      font-size: 13px;
      color: #aaa;
    }

    .fade { animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="passage-wrap">
    <div class="passage-card" id="card">
      <span class="passage-label" id="plabel"></span>
      <p class="passage-text" id="ptext"></p>
      <span class="passage-meta" id="pmeta"></span>
    </div>
    <div class="controls">
      <button class="btn-next" onclick="nextPassage()">Show a different assignment</button>
      <span class="counter" id="pcounter">0 shown</span>
    </div>
  </div>

  <script>
    const passages = [
      {
        text: "The scientific method is a systematic approach to inquiry that relies on observation, hypothesis formation, experimentation, and analysis. By repeating experiments and subjecting findings to peer review, scientists build reliable knowledge about the natural world.",
        meta: "Topic: Research Methods"
      },
      {
        text: "Primary sources are original, first-hand accounts or direct evidence of an event, object, person, or work of art. Examples include diaries, speeches, photographs, and original research articles. They differ from secondary sources, which interpret or analyze primary material.",
        meta: "Topic: Information Literacy"
      },
      {
        text: "Active reading is an intentional, focused form of reading that involves annotating, questioning, and summarizing as you go. Rather than passively absorbing text, active readers engage with the material by making predictions and connecting ideas to prior knowledge.",
        meta: "Topic: Study Skills"
      },
      {
        text: "A thesis statement is the central claim of an essay, typically appearing at the end of the introduction. It tells readers what argument will be made and why it matters. A strong thesis is specific, debatable, and supported by evidence throughout the paper.",
        meta: "Topic: Academic Writing"
      },
      {
        text: "Correlation describes a statistical relationship between two variables that tend to change together, but it does not imply that one causes the other. Many factors can produce a correlation without any direct causal link between them.",
        meta: "Topic: Statistics"
      },
      {
        text: "Cognitive load refers to the mental effort required to process information. When too much information is presented at once, working memory becomes overwhelmed and learning suffers. Breaking content into smaller chunks helps manage cognitive load effectively.",
        meta: "Topic: Learning Theory"
      },
      {
        text: "Peer-reviewed research undergoes evaluation by experts in the relevant field before publication. This process helps ensure that methodology is sound, conclusions are supported by data, and findings contribute meaningfully to the existing body of knowledge.",
        meta: "Topic: Academic Integrity"
      }
    ];

    let lastIndex = -1;
    let count = 0;

    function nextPassage() {
      let idx;
      do { idx = Math.floor(Math.random() * passages.length); } while (idx === lastIndex && passages.length > 1);
      lastIndex = idx;
      count++;
      const p = passages[idx];
      const card = document.getElementById('card');
      card.classList.remove('fade');
      void card.offsetWidth;
      card.classList.add('fade');
      document.getElementById('plabel').textContent = 'Passage ' + (idx + 1) + ' of ' + passages.length;
      document.getElementById('ptext').textContent = p.text;
      document.getElementById('pmeta').textContent = p.meta;
      document.getElementById('pcounter').textContent = count + ' shown';
    }

    nextPassage();
  </script>
</body>
</html>
